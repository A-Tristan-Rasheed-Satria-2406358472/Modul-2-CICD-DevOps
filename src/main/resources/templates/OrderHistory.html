<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Order History</title>
</head>
<body>
<h1>Order History</h1>

<form th:action="@{/order/history}" method="post">
  <div>
    <label for="author">Author</label>
    <input id="author" name="author" type="text" placeholder="Input author name" required>
  </div>

  <div>
    <button type="submit">Search Orders</button>
  </div>
</form>

</body>
</html>
